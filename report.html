<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptitude — Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/report.css">
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav__logo">apt<span>i</span>tude</a>
    <div class="nav__links">
      <a href="coach.html" class="btn btn--primary">New interview</a>
    </div>
  </nav>

  <main class="report" id="empty-state" hidden>
    <p class="report__eyebrow">NO SESSION YET</p>
    <h1 class="report__title">You haven't finished an interview yet.</h1>
    <p style="color: var(--ink-soft); margin-bottom: 32px;">
      Complete a full interview on the coach screen and your report will show up here.
    </p>
    <a href="coach.html" class="btn btn--primary">Start an interview</a>
  </main>

  <main class="report" id="report-content" hidden>
    <p class="report__eyebrow" id="report-eyebrow">SESSION REPORT</p>
    <h1 class="report__title">Here's how it went.</h1>

    <section class="score-band" id="score-band"></section>

    <section class="breakdown">
      <h2 class="breakdown__title">Question by question</h2>
      <div id="breakdown-list"></div>
    </section>

    <section class="tips">
      <h2 class="tips__title">What to work on</h2>
      <div id="tips-list"></div>
    </section>

    <div class="report__actions">
      <a href="coach.html" class="btn btn--primary">Practice again</a>
      <a href="index.html" class="btn btn--ghost">Back home</a>
    </div>
  </main>

  <script src="js/store.js"></script>
  <script src="js/report.js"></script>
</body>
</html>
